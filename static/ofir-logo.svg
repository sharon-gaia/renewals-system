<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="אופיר סוכנות ביטוח">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8a6d1f"/>
      <stop offset="30%" stop-color="#c9a24b"/>
      <stop offset="52%" stop-color="#f3e2ad"/>
      <stop offset="70%" stop-color="#d8b45a"/>
      <stop offset="100%" stop-color="#a9832e"/>
    </linearGradient>
  </defs>
  <!-- gold ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="url(#gold)" stroke-width="4.5"/>
  <circle cx="60" cy="60" r="47.5" fill="none" stroke="url(#gold)" stroke-width="1.4" opacity="0.7"/>
  <!-- brand -->
  <text x="60" y="58" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="34" font-weight="700" fill="#5b6670" letter-spacing="1">אופיר</text>
  <text x="60" y="80" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10.5" font-weight="600" fill="#8a919b" letter-spacing="0.5">סוכנות ביטוח</text>
  <text x="60" y="93" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9" font-weight="600" fill="#a9832e">(1993)</text>
</svg>
